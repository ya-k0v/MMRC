version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: deps
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
      - automated
    commit-message:
      prefix: ci