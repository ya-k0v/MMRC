name: 🐳 Docker Build & Publish

on:
  push:
    branches: [main, docker]
    paths-ignore:
      - '**.md'
      - 'dev/**'
      - 'docs/**'
      - 'docker/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (optional)'
        required: false
        default: ''

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mmrc

jobs:
  # ========================
  # Build and Push
  # ========================
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || 
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/docker'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: 📦 Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================
  # Notify
  # ========================
  notify:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: 📢 Notify via Discord
        if: ${{ secrets.DISCORD_WEBHOOK != '' }}
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🐳 **MMRC Docker Image Built & Pushed**
            
            📦 Image: `${{ env.DOCKERHUB_IMAGE }}:latest`
            🏷️ Roles: `server`, `optimizer`, `streamer` (via ROLE env)
            
            🔖 Commit: `${{ github.sha }}`
            🌿 Branch: `${{ github.ref_name }}`
            👤 Author: `${{ github.actor }}`
            🔗 [View Changes](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            
            🔄 Run `mmrc update` on your server to apply!
