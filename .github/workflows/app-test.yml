name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'v*'
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Quality gate / Node 20
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CONTENT_ROOT: ${{ github.workspace }}/.tmp/videocontrol-data
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app tests
        run: npm run test:ci

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-logs
          path: .tmp/*.log
          if-no-files-found: ignore

  smoke_node22:
    name: Smoke / Node 22
    runs-on: ubuntu-latest
    needs: quality_gate
    if: github.event_name != 'workflow_call'
    timeout-minutes: 15
    env:
      CONTENT_ROOT: ${{ github.workspace }}/.tmp/videocontrol-data
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Startup compatibility check
        run: npm run doctor:start

  dependency_audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: quality_gate
    if: github.event_name != 'workflow_call'
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          mkdir -p .tmp
          npm audit --omit=dev --audit-level=high --json > .tmp/npm-audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit
          path: .tmp/npm-audit.json
          if-no-files-found: ignore

  release_artifact:
    name: Release artifact
    runs-on: ubuntu-latest
    needs: quality_gate
    if: github.event_name != 'pull_request' && github.event_name != 'workflow_call'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tar archive
        run: |
          mkdir -p .tmp
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='data' \
              --exclude='config/*.db' \
              --exclude='config/*.db-*' \
              --exclude='.env' \
              --exclude='.tmp' \
              --exclude='*.log' \
              -czf .tmp/videocontrol-${{ github.sha }}.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-tarball
          path: .tmp/videocontrol-${{ github.sha }}.tar.gz
          if-no-files-found: error
