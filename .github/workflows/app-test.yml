name: App Test

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: app-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CONTENT_ROOT: ${{ runner.temp }}/videocontrol-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app tests
        run: npm run test:ci

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: .tmp/*.log
          if-no-files-found: ignore
