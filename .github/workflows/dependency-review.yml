name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - 'v*'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency_review:
    name: Block high-risk dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect dependency graph support
        id: support
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.request('GET /repos/{owner}/{repo}', {
              owner,
              repo
            });
            const status = response?.data?.security_and_analysis?.dependency_graph?.status || 'unknown';
            const supported = status === 'enabled';
            core.setOutput('supported', supported ? 'true' : 'false');
            if (!supported) {
              core.warning(`Dependency review skipped: dependency graph status is '${status}'.`);
            }

      - name: Dependency review
        if: steps.support.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: Dependency review skipped
        if: steps.support.outputs.supported != 'true'
        run: echo "Dependency graph is not enabled; dependency review check is skipped."
