name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - 'v*'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency_review:
    name: Block high-risk dependency changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
