# VideoControl - Secure Configuration with Network-Level Protection
# Установка: sudo cp /var/lib/mmrc/nginx/videocontrol-secure.conf /etc/nginx/sites-available/videocontrol

# ============================================
# GEO RULES - Настройте под вашу сеть
# ============================================

geo $admin_access {
    default 0;
    10.172.0.0/23 1;       # Офисная сеть
    172.7.7.0/24 1;        # VPN
    127.0.0.1 1;           # Localhost
}

geo $device_access {
    default 0;
    10.172.0.0/23 1;       # Локальная сеть
    172.7.7.0/24 1;        # VPN
    172.16.0.0/12 1;       # Приватные IP
    127.0.0.1 1;           # Localhost
}

# ============================================
# UPSTREAM
# ============================================

upstream nodejs_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ============================================
# SERVER
# ============================================

server {
    listen 80;
    server_name _;
    proxy_intercept_errors on;
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 502 504 /maintenance.html;
    
    # Security headers
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Logging
    access_log /var/log/nginx/videocontrol-access.log combined;
    error_log /var/log/nginx/videocontrol-error.log warn;

    # ============================================
    # PROTECTED: Admin Panels (офисная сеть + JWT)
    # ============================================
    
    location ~ ^/(admin|speaker)\.html$ {
        if ($admin_access = 0) {
            return 403 "Access denied";
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ============================================
    # HERO MODULE: Public and Admin panels
    # ============================================
    
    # Редирект с /hero на /hero/index.html
    location = /hero {
        if ($device_access = 0) {
            return 403 "Access denied";
        }
        return 301 /hero/index.html;
    }
    
    # Публичная панель героев - доступна всем в локальной сети
    location ~ ^/hero/index\.html$ {
        if ($device_access = 0) {
            return 403 "Access denied";
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Админ панель героев - требует admin_access
    location ~ ^/hero/admin\.html$ {
        if ($admin_access = 0) {
            return 403 "Access denied";
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Статические файлы модуля hero (JS, CSS)
    location ~ ^/hero/(js|css)/ {
        if ($device_access = 0) {
            return 403 "Access denied";
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Кэширование для статики
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # ============================================
    # PROTECTED: REST API (офисная сеть + JWT)
    # ============================================
    
    location /api/ {
        if ($admin_access = 0) {
            return 403 "API access denied";
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # ВАЖНО: Пробрасываем Range для корректного частичного скачивания/seek
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # Стриминговая отдача (без буферизации, чтобы не ломать Content-Length)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_ignore_client_abort off;
        proxy_max_temp_file_size 0;
        gzip off;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        
        client_max_body_size 5G;
        client_body_buffer_size 128k;
    }
    
    # ============================================
    # DEVICES: Socket.IO (локальная сеть, БЕЗ JWT)
    # ============================================
    
    location /socket.io/ {
        if ($device_access = 0) {
            return 403;
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        
        # Длинные таймауты для 24/7
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_socket_keepalive on;
        proxy_buffering off;
    }
    
    # ============================================
    # DEVICES: Players & Content (локальная сеть)
    # ============================================
    
    location ~ ^/player.*\.html$ {
        if ($device_access = 0) {
            return 403;
        }
        proxy_pass http://nodejs_backend;
    }
    
    # НОВОЕ: Виртуальные пути /content/{device}/{file} → proxy через resolver
    location ~ ^/content/([A-Za-z0-9_-]+)/(.+)$ {
        if ($device_access = 0) {
            return 403;
        }
        
        # Проксируем на file resolver
        proxy_pass http://nodejs_backend/api/files/resolve/$1/$2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Поддержка Range requests
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # Таймауты для больших файлов
        proxy_connect_timeout 300s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
    }
    
    # ============================================
    # PUBLIC: Static Assets
    # ============================================
    
    # Vendor файлы отдаем напрямую (избегаем ERR_CONTENT_LENGTH_MISMATCH)
    location ~ ^/vendor/ {
        if ($device_access = 0) {
            return 403;
        }
        
        root /var/lib/mmrc/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Отключаем gzip для JS файлов (избегаем проблем с Content-Length)
        gzip off;
    }
    
    # JS файлы - отключаем gzip и буферизацию для избежания ERR_CONTENT_LENGTH_MISMATCH
    location ~ ^/js/.*\.js$ {
        if ($device_access = 0) {
            return 403;
        }
        
        proxy_pass http://nodejs_backend;
        proxy_buffering off;
        proxy_request_buffering off;
        gzip off;
        expires 0;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    
    # Остальные статические файлы (CSS, иконки и т.д.)
    location ~ ^/(css|icon.*\.(svg|png|ico)|favicon.*|apple-touch-icon\.png|manifest.*\.json|sw\.js)$ {
        if ($device_access = 0) {
            return 403;
        }
        
        proxy_pass http://nodejs_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # ============================================
    # DEFAULT (index.html) - требует admin_access
    # ============================================

    location = /maintenance.html {
        root /var/lib/mmrc/public;
        internal;
    }

    location = /403.html {
        root /var/lib/mmrc/public;
        internal;
    }

    location = /404.html {
        root /var/lib/mmrc/public;
        internal;
    }
    
    location / {
        if ($admin_access = 0) {
            return 403 "Access denied";
        }
        
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
