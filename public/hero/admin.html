<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
  <title>MMRC Panel — Hero Admin</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <link rel="stylesheet" href="/css/hero.css"/>
  <script type="module" src="/hero/js/hero-admin.js"></script>
</head>
<body class="hero-admin-page">
  <header class="toolbar">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <strong class="meta">Карточки героев</strong>
      <div style="display:flex; align-items:center; gap:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span id="userFullName" class="meta" style="font-weight:500; color:var(--text);"></span>
        <span class="meta" style="color:var(--muted);">•</span>
        <span id="logoutBtn" class="meta" style="font-weight:500; color:var(--text); text-decoration:underline; cursor:pointer;">Выйти</span>
      </div>
    </div>
    <div style="display:flex; gap:8px; flex-shrink:0; margin-left:auto;">
      <button id="importDbBtn" class="meta-lg" type="button" title="Импорт базы (.db)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px;">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        Импорт БД
      </button>
      <input type="file" id="importDbFileInput" accept=".db" style="display:none;">
      <button id="importBtn" class="meta-lg" type="button" title="Импорт из CSV/Excel">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px;">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        Импорт CSV/Excel
      </button>
      <input type="file" id="importFileInput" accept=".csv,.xlsx,.xls" style="display:none;">
      <button id="exportDbBtn" class="meta-lg" type="button" title="Экспорт базы данных">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px;">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Экспорт БД
      </button>
      <button id="addHeroBtn" class="meta-lg" type="button">Добавить</button>
    </div>
  </header>

  <main class="hero-admin-layout">
    <aside class="panel hero-admin-list">
      <div class="hero-admin-list__header">
        <h3>Карточки</h3>
        <span id="heroCount" class="meta">0</span>
      </div>
      <div class="hero-admin-search">
        <input id="heroSearch" type="text" placeholder="Поиск по ФИО" autocomplete="off"/>
      </div>
      <ul id="heroList" class="hero-admin-list__items"></ul>
    </aside>

    <section class="panel hero-admin-detail">
      <div id="heroDetail" class="hero-admin-detail__content"></div>
      <div id="heroDetailPlaceholder" class="hero-admin-detail__placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <p>Выберите героя слева, чтобы отредактировать карточку</p>
      </div>
    </section>
  </main>
  <div id="lightbox" style="display:none;"></div>
</body>
</html>
