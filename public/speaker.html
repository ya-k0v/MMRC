<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
  <title>MMRC Speaker</title>
  
  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  
  <!-- PWA Support -->
  <link rel="manifest" href="/manifest-speaker.json"/>
  <meta name="theme-color" content="#3b82f6"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="MMRC Speaker"/>
  
  <link rel="stylesheet" href="/css/app.css"/>
  <link rel="stylesheet" href="/css/tablet-improvements.css"/>
  <style>
    /* Speaker-specific adjustments */
    :root {
      --speaker-base-font-size: clamp(14px, 1.15vw + 10px, 18px);
      --speaker-control-height: clamp(38px, 4.8dvh, 52px);
      --speaker-control-padding-y: clamp(6px, 0.9dvh, 10px);
      --speaker-control-padding-x: clamp(10px, 1.6vw, 16px);
      --speaker-pager-btn-min-width: clamp(72px, 12vw, 112px);
      --speaker-preview-close-size: clamp(38px, 4.6dvh, 46px);
      --speaker-tv-pager-btn-min-width: clamp(50px, 8vw, 72px);
      --speaker-tv-pager-btn-height: clamp(34px, 4.1dvh, 42px);
      --speaker-tv-pager-btn-padding-y: clamp(3px, 0.45dvh, 6px);
      --speaker-tv-pager-btn-padding-x: clamp(6px, 0.85vw, 10px);
      --speaker-file-item-min-height: clamp(52px, 6.4dvh, 70px);
      --speaker-file-info-padding: clamp(2px, 0.45dvh, 6px) clamp(8px, 1.3vw, 12px);
      --speaker-file-name-gap: 2px;
      --speaker-file-meta-gap: 3px;
      --speaker-file-name-size: clamp(0.92rem, 0.38vw + 0.84rem, 1.04rem);
      --speaker-badge-font-size: clamp(0.68rem, 0.24vw + 0.6rem, 0.8rem);
      --speaker-play-icon-size: clamp(1.55rem, 1.25vw + 1.2rem, 2rem);
      --speaker-play-min-width: clamp(64px, 10vw, 84px);
      --speaker-tile-min-height: clamp(74px, 10dvh, 96px);
      --speaker-controls-gap: clamp(6px, 1vw, 10px);
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body.maintenance-ui {
      font-size: var(--speaker-base-font-size);
    }

    /* По умолчанию (<1024px): всё вертикально */
    .speaker-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
      padding: var(--space-md);
      min-height: 0;
    }
    
    .speaker-main {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
      min-height: 0;
    }

    .speaker-layout .file-item {
      min-height: var(--speaker-file-item-min-height) !important;
      max-height: none !important;
    }

    .speaker-layout .file-item .file-info {
      padding: var(--speaker-file-info-padding) !important;
    }

    .speaker-layout .file-item .file-item-name {
      font-size: var(--speaker-file-name-size) !important;
    }

    .speaker-layout .file-item .file-type-badge,
    .speaker-layout .file-item .resolution-badge,
    .speaker-layout .file-item .device-badge {
      font-size: var(--speaker-badge-font-size) !important;
    }

    .speaker-layout .playBtn {
      min-width: var(--speaker-play-min-width) !important;
      font-size: var(--speaker-play-icon-size) !important;
    }

    #playerControls {
      gap: var(--speaker-controls-gap) !important;
    }

    #tvPager {
      flex-wrap: nowrap !important;
      gap: clamp(4px, 0.7vw, 8px) !important;
    }

    #tvPager > button {
      flex: 1 1 0;
      min-width: 0;
    }

    #tvPager > span {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    #filesPaneMeta {
      display: none;
    }

    @media (min-width: 1200px) and (hover: hover) and (pointer: fine) {
      #filesPaneMeta {
        display: block;
      }
    }

    @media (display-mode: standalone), (display-mode: fullscreen), (display-mode: minimal-ui) {
      #filesPaneMeta {
        display: none !important;
      }
    }

    #playerControls button,
    #filesModeSwitch button,
    #tvPager button,
    #filePager button,
    .preview-controls button:not(#pdfCloseBtn) {
      min-height: var(--speaker-control-height) !important;
      height: auto !important;
      min-width: var(--speaker-pager-btn-min-width) !important;
      padding: var(--speaker-control-padding-y) var(--speaker-control-padding-x) !important;
    }

    #pdfCloseBtn {
      min-width: var(--speaker-preview-close-size) !important;
      width: var(--speaker-preview-close-size) !important;
      min-height: var(--speaker-preview-close-size) !important;
      height: var(--speaker-preview-close-size) !important;
      padding: 0 !important;
      flex: 0 0 var(--speaker-preview-close-size) !important;
      aspect-ratio: 1 / 1;
      line-height: 1;
      align-self: center;
    }

    #tvPager > button.secondary {
      min-width: var(--speaker-tv-pager-btn-min-width) !important;
      min-height: var(--speaker-tv-pager-btn-height) !important;
      height: var(--speaker-tv-pager-btn-height) !important;
      padding: var(--speaker-tv-pager-btn-padding-y) var(--speaker-tv-pager-btn-padding-x) !important;
      font-size: clamp(0.78rem, 0.2vw + 0.72rem, 0.9rem);
      line-height: 1.1;
    }

    #tvPager > span {
      font-size: clamp(0.78rem, 0.2vw + 0.72rem, 0.9rem);
    }

    .speaker-layout .tvTile,
    .speaker-layout #tvList li {
      min-height: var(--speaker-tile-min-height) !important;
    }
    
    /* КРИТИЧНО: Ограничиваем ширину панели файлов */
    .files-panel {
      max-width: 100%;
      overflow: hidden;
    }
    
    .files-panel .list {
      max-width: 100%;
    }
    
    /* Минимальные высоты для вертикального режима */
    .sidebar {
      min-height: auto;
      max-height: none;
      display: flex;
      flex-direction: column;
    }
    
    #tvList {
      overflow-y: visible;
      overflow-x: hidden;
      max-height: none;
      min-height: auto;
    }
    
    .speaker-main > .panel:first-child {
      min-height: 280px;
      max-height: 600px;
    }
    
    .speaker-main > .panel:first-child #fileList {
      min-height: 220px;
    }
    
    /* Широкий экран (≥1024px): всё горизонтально */
    @media (min-width: 1024px) {
      :root {
        --speaker-base-font-size: clamp(14px, 0.9vw + 10px, 18px);
        --speaker-file-item-min-height: clamp(54px, 5.8dvh, 72px);
      }

      .speaker-layout {
        grid-template-columns: 280px 1fr;
      }
      
      .speaker-main {
        grid-template-columns: minmax(0, 1fr) 360px;
      }
      
      /* На десктопе также ограничиваем */
      .files-panel {
        max-width: 100%;
        overflow: hidden;
      }
      
      /* Сбрасываем ограничения высоты на широких экранах */
      .sidebar,
      #tvList,
      .speaker-main > .panel:first-child,
      .speaker-main > .panel:first-child #fileList {
        min-height: 0;
        max-height: none;
      }
      
      /* Убираем скролл у списка устройств на десктопе */
      #tvList {
        overflow-y: visible;
        overflow-x: hidden;
      }
    }
    
    .volume-panel {
      margin-top: var(--space-md);
      padding: var(--space-md);
      background: var(--panel-2);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    
    .preview-panel {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    
    .preview-panel .volume-panel {
      margin-top: auto;
    }
    
    .volume-panel .volume-slider-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: auto;
    }
    
    .volume-panel input[type="range"] {
      flex: 1;
      accent-color: var(--brand);
    }
    
    .volume-panel .volume-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      min-width: 64px;
      text-align: right;
    }
    
    #videoProgressContainer {
      margin: 0 0 var(--space-sm) 0;
    }
    
    #videoProgressBar {
      width: 100%;
      height: 8px;
      cursor: pointer;
      accent-color: var(--brand);
      background: var(--panel-2);
      border-radius: var(--radius-sm);
    }
    
    #videoProgressBar:hover {
      accent-color: var(--brand-hover, var(--brand));
    }
    
    #videoProgressBar:active {
      cursor: grabbing;
    }
    
    .meta-value-player {
      color: var(--success, #22c55e); /* зеленый - duration от плеера */
    }
    
    .meta-value-db {
      color: var(--danger, #ef4444); /* красный - duration из базы данных */
    }
    
    #videoProgressBar:disabled {
      cursor: not-allowed !important;
      opacity: 0.6;
    }
    
    /* ===== Мобильная версия ===== */
    @media (max-width: 767px) {
      :root {
        --speaker-base-font-size: clamp(14px, 2.9vw, 16px);
        --speaker-control-height: clamp(40px, 5.5dvh, 50px);
        --speaker-file-item-min-height: clamp(52px, 8dvh, 74px);
        --speaker-play-min-width: clamp(62px, 21vw, 84px);
      }

      /* Увеличиваем высоту плиток устройств на мобильных */
      .speaker-layout .tvTile {
        height: 90px !important;
        min-height: 90px !important;
      }
      
      /* Скрываем видео превью на мобильных */
      .speaker-layout .preview-panel #filePreview > iframe,
      .speaker-layout .preview-panel #filePreview > video {
        display: none !important;
      }
      
      /* Отключаем клики по превью на мобильных (кроме папок/PPTX/PDF) */
      /* Миниатюры (thumbnail-preview) остаются кликабельными */
      .speaker-layout .preview-panel #filePreview:has(> iframe) {
        pointer-events: none !important;
      }
      
      .speaker-layout .preview-panel #filePreview:has(> video) {
        pointer-events: none !important;
      }
      
      /* Разрешаем клики по миниатюрам папок/PPTX/PDF */
      .speaker-layout .preview-panel #filePreview:has(.thumbnail-preview),
      .speaker-layout .preview-panel #filePreview:has(.static-preview-layout) {
        pointer-events: auto !important;
      }
      
      /* Скрываем весь контейнер превью, если внутри только iframe (видео превью) */
      .speaker-layout .preview-panel #filePreview:has(> iframe:only-child),
      .speaker-layout .preview-panel #filePreview:has(> video:only-child) {
        display: none !important;
      }
      
      /* Показываем превью папок (миниатюры) */
      .speaker-layout .preview-panel #filePreview:has(.thumbnail-preview),
      .speaker-layout .preview-panel #filePreview:has(.static-preview-layout) {
        display: flex !important;
      }
      
      /* Убираем скролл у списка устройств на мобильных */
      .speaker-layout #tvList {
        overflow-y: visible !important;
        overflow-x: hidden !important;
        max-height: none !important;
        min-height: auto !important;
      }
      
      /* Убираем фиксированные высоты у панели устройств на мобильных */
      .speaker-layout .sidebar.devices-panel {
        min-height: auto !important;
        max-height: none !important;
      }
      
      /* Превью папок на мобильных: показываем только 6 картинок с фиксированной высотой и скроллом */
      .speaker-layout .preview-panel #filePreview .static-preview-layout {
        display: flex !important;
        flex-direction: column !important;
      }
      
      .speaker-layout .preview-panel #filePreview .static-preview-scroll {
        overflow-y: auto !important;
        overflow-x: hidden !important;
        /* Фиксированная высота для показа ровно 3 рядов (6 картинок по 2 в ряду) */
        /* Картинки с aspect-ratio 16/9, на мобильных в 2 колонки */
        /* Примерная высота: (ширина/2 * 9/16) * 3 ряда + gap * 2 = ~300px */
        max-height: 300px !important;
        min-height: 300px !important;
      }
      
      /* На мобильных 2 колонки для миниатюр */
      .speaker-layout .preview-panel #filePreview .thumbnail-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/speaker.js"></script>
</head>
<body class="maintenance-ui">
  <header class="toolbar">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex:1;">
      <button id="themeBtn" class="meta-lg" type="button" style="padding:8px 12px; display:flex; align-items:center; justify-content:center;" aria-label="Переключить тему"></button>
      <strong class="meta">Панель спикера</strong>
      <div style="display:flex; align-items:center; gap:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span id="userFullName" class="meta" style="font-weight:500; color:var(--text);"></span>
        <span class="meta" style="color:var(--muted);">•</span>
        <span id="logoutBtn" class="meta" style="font-weight:500; color:var(--text); text-decoration:underline; cursor:pointer;">Выйти</span>
      </div>
      <div style="flex:1 1 auto;"></div>
      <button id="launchAndroidBtn" class="meta-lg" type="button" style="min-width:36px; width:36px; height:36px; padding:0; border-radius:var(--radius-sm); flex-shrink:0; align-items:center; justify-content:center; font-size:var(--font-size-lg); line-height:1; transition:all 0.2s; box-shadow:var(--shadow-sm); background:#4caf50; color:#fff; display:none; margin-left:auto;" title="Запустить Android-приложение">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polygon points="6,4 20,12 6,20"></polygon></svg>
      </button>
    </div>
  </header>

  <main class="speaker-layout">
    <aside class="sidebar panel devices-panel">
      <div class="header" style="display:flex; justify-content:space-between; align-items:center; gap:var(--space-sm); margin-bottom:var(--space-sm)">
        <h3 class="title" style="margin:0; font-size:var(--font-size-base)">Устройства</h3>
        <div class="meta" id="devicesMeta" style="margin:0; white-space:nowrap">0</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:var(--space-md); flex:1 1 auto; min-height:0">
        <ul id="tvList" class="list" style="flex:1 1 auto; min-height:0; overflow-y:visible; overflow-x:hidden; display:flex; flex-direction:column; gap:var(--space-sm)"></ul>
        <div id="tvPager" class="meta" style="display:flex; justify-content:space-between; align-items:center; gap:var(--space-sm); flex-wrap:nowrap"></div>
      </div>
    </aside>
    <section class="speaker-main">
      <div class="panel files-panel" style="min-height:0; display:flex; flex-direction:column">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center; gap:var(--space-sm); margin-bottom:var(--space-sm); flex-wrap:wrap">
          <div style="display:flex; align-items:flex-end; gap:2px; flex-wrap:wrap">
            <div id="filesModeSwitch" style="display:flex; align-items:flex-end; gap:2px;">
              <button id="filesModeDevice" class="secondary" type="button" style="padding:8px 14px; border-radius:8px 8px 0 0; border:1px solid var(--border); background:var(--panel-2);">Файлы на устройстве</button>
              <button id="filesModeAll" class="secondary" type="button" style="padding:8px 14px; border-radius:8px 8px 0 0; border:1px solid var(--border); background:var(--panel-2);">Все файлы</button>
            </div>
          </div>
          <div class="meta" id="filesPaneMeta" style="margin:0; white-space:nowrap">Выберите устройство слева</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:var(--space-md); flex:1 1 auto; min-height:0">
          <ul id="fileList" class="list" style="flex:1 1 auto; min-height:0; overflow:hidden"></ul>
          <div id="filePager" class="meta" style="display:flex; justify-content:space-between; align-items:center; gap:var(--space-sm); flex-wrap:wrap"></div>
        </div>
      </div>
      <div class="panel preview-panel">
        <h3 class="title">Превью</h3>
        <div id="previewPlaybackInfo" class="meta" style="margin:6px 0 8px 0; min-height:1.2em; color: var(--text);"></div>
        <div id="videoProgressContainer" style="display:none; margin:0 0 8px 0;">
          <input type="range" id="videoProgressBar" min="0" max="100" step="0.1" value="0" style="width:100%; cursor:pointer;" />
        </div>
        <div id="filePreview" class="miniPreview"></div>
        <div class="preview-controls">
          <button id="pdfPrevBtn" class="secondary" type="button">◀ Назад</button>
          <button id="pdfNextBtn" class="secondary" type="button">Вперёд ▶</button>
          <button id="pdfCloseBtn" class="danger" type="button">✕</button>
        </div>
        <div class="volume-panel" id="volumePanel">
          <div class="volume-slider-row">
            <input type="range" id="volumeSlider" min="0" max="100" step="5" value="50" disabled />
            <div class="volume-value" id="volumeLevelLabel">--%</div>
            <button id="volumeMuteBtn" class="secondary" type="button" disabled>
              <span class="volume-btn-icon" aria-hidden="true">🔇</span>
            </button>
          </div>
          <div class="player-controls" id="playerControls" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:var(--space-md);">
            <button id="playBtn" class="primary" type="button" style="flex:1; min-width:90px;">▶ Play</button>
            <button id="pauseBtn" class="secondary" type="button" style="flex:1; min-width:90px;">⏸ Pause</button>
            <button id="restartBtn" class="secondary" type="button" style="flex:1; min-width:90px;">⏮ Restart</button>
            <button id="stopBtn" class="danger" type="button" style="flex:1; min-width:90px;">⏹ Stop</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
