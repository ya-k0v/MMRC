<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
  <title>MMRC доступ запрещён</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #120b14;
      --bg2: #24111c;
      --panel: rgba(22, 12, 18, 0.92);
      --border: rgba(244, 114, 182, 0.18);
      --text: #fff1f5;
      --muted: #e7b8c8;
      --accent: #fb7185;
      --accent2: #f59e0b;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(251, 113, 133, 0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.12), transparent 30%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .wrap {
      width: min(760px, calc(100vw - 32px));
      padding: 28px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(24, 12, 18, 0.96), rgba(14, 8, 12, 0.98));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 34px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(251, 113, 133, 0.12), transparent 36%, rgba(245, 158, 11, 0.08));
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border: 1px solid rgba(251, 113, 133, 0.24);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(251, 113, 133, 0.08);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(38px, 6vw, 72px);
      line-height: 0.94;
      letter-spacing: -0.06em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
      max-width: 56ch;
    }

    .status {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(24, 12, 18, 0.72);
      color: var(--text);
      font-size: 14px;
      text-decoration: none;
    }

    .pill.primary {
      border-color: rgba(251, 113, 133, 0.24);
      background: rgba(251, 113, 133, 0.12);
      color: #ffe4e6;
    }

    .icon-panel {
      width: min(100%, 280px);
      aspect-ratio: 1;
      border-radius: 28px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background:
        radial-gradient(circle at center, rgba(251, 113, 133, 0.16), transparent 44%),
        rgba(24, 12, 18, 0.72);
      display: grid;
      place-items: center;
      margin-left: auto;
      position: relative;
      overflow: hidden;
    }

    .icon-panel::before,
    .icon-panel::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 22px;
      border: 1px solid rgba(251, 113, 133, 0.14);
    }

    .icon-panel::after {
      inset: 34px;
      border-color: rgba(245, 158, 11, 0.16);
    }

    .number {
      font-size: clamp(82px, 16vw, 142px);
      font-weight: 800;
      letter-spacing: -0.08em;
      line-height: 1;
      color: rgba(255, 255, 255, 0.96);
      text-shadow: 0 16px 44px rgba(0, 0, 0, 0.35);
      position: relative;
      z-index: 1;
    }

    .footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 780px) {
      .wrap { padding: 16px; }
      .card { padding: 24px; border-radius: 24px; }
      .grid { grid-template-columns: 1fr; }
      .icon-panel { margin: 8px auto 0; width: min(100%, 220px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="grid">
        <div>
          <div class="eyebrow">MMRC · доступ запрещён</div>
          <h1>403</h1>
          <p>
            У вас нет прав для просмотра этой страницы. Если вы уверены, что доступ должен быть,
            проверьте роль пользователя или сеть, с которой вы подключены.
          </p>
          <div class="status">
            <a class="pill primary" href="/">На главную</a>
          </div>
        </div>
        <div class="icon-panel" aria-hidden="true">
          <div class="number">403</div>
        </div>
      </div>
      <div class="footer">
        <span>Доступ ограничен политиками сервера.</span>
      </div>
    </section>
  </div>
</body>
</html>
