<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>袙褏芯写 - MMRC Hub</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
  <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;">
    <div class="card" style="max-width:400px; width:100%;">
      <div class="header">
        <div class="title">袙褏芯写 胁 MMRC Hub</div>
      </div>
      
      <form id="loginForm" style="display:flex; flex-direction:column; gap:16px;">
        <div>
          <label style="display:block; margin-bottom:4px; font-weight:500;">袥芯谐懈薪</label>
          <input 
            type="text" 
            id="username" 
            class="input" 
            placeholder="admin" 
            autocomplete="username"
            required 
            autofocus
          />
        </div>
        
        <div>
          <label style="display:block; margin-bottom:4px; font-weight:500;">袩邪褉芯谢褜</label>
          <input 
            type="password" 
            id="password" 
            class="input" 
            placeholder="袙胁械写懈褌械 锌邪褉芯谢褜" 
            autocomplete="current-password"
            required
          />
        </div>
        
        <div id="error" style="color:var(--danger); font-size:0.875rem; display:none;"></div>
        
        <button type="submit" class="primary" id="loginBtn" style="width:100%;">
          袙芯泄褌懈
        </button>
      </form>
      
      <div class="meta" style="margin-top:16px; text-align:center;">
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const loginBtn = document.getElementById('loginBtn');

    function setLoginButtonLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? '袙褏芯写...' : '袙芯泄褌懈';
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showError('袟邪锌芯谢薪懈褌械 胁褋械 锌芯谢褟');
        return;
      }
      
      // 袘谢芯泻懈褉褍械屑 泻薪芯锌泻褍
      setLoginButtonLoading(true);
      errorEl.style.display = 'none';
      let redirected = false;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          data = {};
        }
        
        if (response.ok) {
          // 小芯褏褉邪薪褟械屑 褌芯泻械薪褘
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('refreshToken', data.refreshToken);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // 袪械写懈褉械泻褌 胁 蟹邪胁懈褋懈屑芯褋褌懈 芯褌 褉芯谢懈
          if (data.user.role === 'hero_admin') {
            redirected = true;
            window.location.href = '/hero/admin.html';
          } else if (data.user.role === 'admin') {
            redirected = true;
            window.location.href = '/admin.html';
          } else if (data.user.role === 'speaker') {
            redirected = true;
            window.location.href = '/speaker.html';
          } else {
            redirected = true;
            window.location.href = '/admin.html'; // Fallback
          }
        } else {
          const blockedByCode = data.code === 'ACCOUNT_DISABLED';
          const blockedByStatus = response.status === 403 && /芯褌泻谢褞褔|蟹邪斜谢芯泻|disabled|blocked/i.test(String(data.error || ''));

          if (blockedByCode || blockedByStatus) {
            showError('袩芯谢褜蟹芯胁邪褌械谢褜 蟹邪斜谢芯泻懈褉芯胁邪薪. 袨斜褉邪褌懈褌械褋褜 泻 邪写屑懈薪懈褋褌褉邪褌芯褉褍.');
          } else {
            showError(data.error || '袧械胁械褉薪褘泄 谢芯谐懈薪 懈谢懈 锌邪褉芯谢褜');
          }
        }
      } catch (err) {
        console.error('Login error:', err);
        showError('袨褕懈斜泻邪 锌芯写泻谢褞褔械薪懈褟 泻 褋械褉胁械褉褍');
      } finally {
        if (!redirected) {
          setLoginButtonLoading(false);
        }
      }
    });
    
    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }
    
    // 袩褉芯胁械褉褟械屑 邪胁褌芯褉懈蟹邪褑懈褞 锌褉懈 蟹邪谐褉褍蟹泻械
    (async function checkAuth() {
      const token = localStorage.getItem('accessToken');
      const userStr = localStorage.getItem('user');
      
      console.log('[Index] Token exists:', !!token, 'User exists:', !!userStr);
      
      // 袝褋谢懈 械褋褌褜 褌芯泻械薪 - 锌褉芯胁械褉褟械屑 械谐芯 胁邪谢懈写薪芯褋褌褜 懈 褉械写懈褉械泻褌懈屑
      if (token && userStr) {
        try {
          const user = JSON.parse(userStr);
          console.log('[Index] User role:', user.role);
          
          // 袩褉芯胁械褉褟械屑 褔褌芯 褌芯泻械薪 胁邪谢懈写薪褘泄 (斜褘褋褌褉邪褟 锌褉芯胁械褉泻邪 褔械褉械蟹 API)
          const response = await fetch('/api/auth/me', {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          
          if (response.ok) {
            // 孝芯泻械薪 胁邪谢懈写薪褘泄 - 褉械写懈褉械泻褌 锌芯 褉芯谢懈
      if (user.role === 'speaker') {
              window.location.replace('/speaker.html');
            } else if (user.role === 'hero_admin') {
              window.location.replace('/hero/admin.html');
            } else if (user.role === 'admin') {
              window.location.replace('/admin.html');
            } else {
              window.location.replace('/admin.html');
            }
          } else {
            // 孝芯泻械薪 薪械胁邪谢懈写薪褘泄 - 芯褔懈褖邪械屑 懈 锌芯泻邪蟹褘胁邪械屑 褎芯褉屑褍
            console.log('[Index] Token invalid, clearing localStorage');
            localStorage.clear();
          }
        } catch (e) {
          console.error('[Index] Error checking auth:', e);
          localStorage.clear();
        }
      } else {
        console.log('[Index] No token - showing login form');
      }
    })();
  </script>
</body>
</html>
