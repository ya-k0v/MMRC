<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="play-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.25"/>
    </filter>
    <filter id="glass" x="0" y="0">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="lighten"/>
    </filter>
  </defs>
  
  <!-- Device frame -->
  <rect x="40" y="30" width="560" height="300" rx="35" fill="url(#bg-gradient)" filter="url(#shadow)"/>
  
  <!-- Inner glass panel -->
  <rect x="70" y="60" width="500" height="240" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="2" filter="url(#glass)"/>

  <!-- Play button -->
  <circle cx="320" cy="180" r="80" fill="url(#play-gradient)" opacity="0.95" filter="url(#shadow)"/>
  <polygon points="295,140 295,220 365,180" fill="#fff"/>
</svg>