worker_processes auto;
error_log /tmp/nginx-error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 5120M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # WebSocket support for Socket.IO
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream mmrc_backend {
        server 127.0.0.1:3000;
    }

    server {
        listen 80;
        server_name _;

        # Health check (direct, no proxy)
        location /health {
            proxy_pass http://mmrc_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://mmrc_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;
        }

        # Auth endpoints (stricter rate limiting)
        location /api/auth/ {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://mmrc_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Upload endpoints
        location ~ ^/api/devices/[^/]+/upload {
            client_max_body_size 5120M;
            limit_req zone=upload burst=5 nodelay;

            proxy_pass http://mmrc_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for uploads
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Socket.IO - serve socket.io.js and handle WebSocket upgrades
        # CRITICAL: ^~ gives this prefix location priority over regex locations
        location ^~ /socket.io/ {
            proxy_pass http://mmrc_backend;
            proxy_http_version 1.1;
            
            # Only set WebSocket upgrade headers when client requests upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No buffering for WebSockets and dynamic content
            proxy_buffering off;
            proxy_cache off;
            
            # Longer timeout for polling transport
            proxy_read_timeout 86400s;
        }

        # Static files (admin, speaker, hero panels) - serve directly from /app/public
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /app/public;
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # HTML files - serve directly
        location ~* \.(html|htm)$ {
            root /app/public;
            try_files $uri =404;
        }

        # Main app - proxy everything else to Node.js
        location / {
            proxy_pass http://mmrc_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # HLS streams
        location /streams/ {
            alias /app/data/streams/;
            add_header Cache-Control no-cache;
            add_header X-Accel-Buffering no;

            # CORS for streams
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";

            if ($request_method = OPTIONS) {
                return 204;
            }

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # Media files
        location /content/ {
            alias /app/data/content/;
            internal;
        }

        # Trailers cache
        location /cache/trailers/ {
            alias /app/data/cache/trailers/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }

    # HTTPS server (uncomment and configure when SSL certs are available)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl-certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl-certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Same location blocks as above...
    # }
}
